<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Pollo Loco</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="img/cactus-favicon.png" />
    <!-- <script src="./classes/level.class.js" defer></script> -->
    <!-- <script src="./scripts/levels/level1.js" defer></script> -->
    <script src="./classes/keyboard.class.js" defer></script>
    <script src="./classes/drawable-object.class.js" defer></script>
    <script src="./classes/moveAble-object.class.js" defer></script>
     <script src="./classes/throwable-object.class.js" defer></script>
    <script src="./classes/character.class.js" defer></script>
    <script src="./classes/chicken.class.js" defer></script>
      <script src="./classes/endboss.class.js" defer></script>
    <script src="./classes/clouds.class.js" defer></script>
    <script src="./classes/background-objects.class.js" defer></script>
    <script src="./classes/statusbar.class.js" defer></script>
     <script src="./classes/sound.class.js" defer></script>
    <script src="./classes/coins.class.js" defer></script>
     <script src="./classes/salsa-bottle.class.js" defer></script>
    <script src="./classes/Level.class.js" defer></script>
    <script src="./scripts/levels/level1.js" defer></script>
    <script src="./classes/world.class.js" defer></script>
    <script src="./scripts/game.js" defer></script>
  </head>
  <body onload="init()">
    <h1>El Pollo Loco</h1>
    <canvas id="canvas" width="720" height="480"> </canvas>
    <dialog id="startScreen">
      <h2>El Pollo Loco!</h2>
      <div>
        <button id="startButton">Spiel starten</button>
        <button id="instructionsButton">Anleitung</button>
      </div>
    </dialog>
     <dialog id="gameOverScreen">
    <img src="img/game-over.png" alt="Game Over" class="game-over-image" />
      <div>
        <button id="restartButton">Nochmal spielen</button>
      </div>
    </dialog>
      <dialog id="winScreen">
    <img src="img/You won, you lost/You won A.png" alt="You Win" class="win-image" />
      <div>
        <button id="playAgainButton">Nochmal spielen</button>
      </div>
    </dialog>
  </body>
</html>
